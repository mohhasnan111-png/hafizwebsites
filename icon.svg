<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC847"/>
      <stop offset="100%" stop-color="#F5B324"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle amber glow in corner -->
  <circle cx="420" cy="92" r="120" fill="#F5B324" opacity="0.06"/>

  <!-- Laptop body group, centered -->
  <g transform="translate(96, 130)" filter="url(#glow)">
    <!-- Laptop screen outline -->
    <rect x="0" y="0" width="288" height="180" rx="14" fill="none" stroke="url(#amber)" stroke-width="14"/>
    <!-- Camera dot -->
    <circle cx="144" cy="14" r="3.5" fill="#1a1a1a"/>
    <!-- Laptop base -->
    <rect x="-24" y="190" width="336" height="28" rx="6" fill="url(#amber)"/>
    <!-- Cursor arrow on screen -->
    <path d="M 175 95 L 215 115 L 195 122 L 188 142 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
    <!-- Pixel particles -->
    <rect x="220" y="20" width="22" height="22" rx="2" fill="url(#amber)"/>
    <circle cx="200" cy="14" r="6" fill="none" stroke="url(#amber)" stroke-width="3"/>
    <rect x="252" y="50" width="14" height="14" rx="2" fill="url(#amber)" opacity="0.7"/>
    <rect x="230" y="78" width="10" height="10" rx="1.5" fill="url(#amber)" opacity="0.5"/>
    <rect x="265" y="32" width="8" height="8" rx="1" fill="url(#amber)" opacity="0.85"/>
  </g>
</svg>
